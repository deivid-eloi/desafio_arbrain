services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: brewcontrol
      POSTGRES_USER: brewuser
      POSTGRES_PASSWORD: brewpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewuser -d brewcontrol"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend/BrewControl.Api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=brewcontrol;Username=brewuser;Password=brewpass
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
